# In-memory H2 (PostgreSQL compatibility mode) so the persistence layer is
# verifiable without a running Postgres. Hibernate generates the schema from the
# entities; Flyway (which needs pgvector) is off for tests.
spring.datasource.url=jdbc:h2:mem:codeshift;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
