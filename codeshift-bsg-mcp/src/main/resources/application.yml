# BSG MCP server — stdio transport, no web server.
spring:
  main:
    web-application-type: none
    banner-mode: off
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/codeshift}
    username: ${DB_USER:codeshift}
    password: ${DB_PASSWORD:codeshift}
  jpa:
    hibernate:
      ddl-auto: none   # Flyway (run by codeshift-api) owns the schema
    open-in-view: false
  ai:
    mcp:
      server:
        stdio: true
        name: codeshift-bsg
        version: 0.1.0

# stdio MCP servers must not log to stdout (it corrupts the protocol stream).
logging:
  pattern:
    console:
