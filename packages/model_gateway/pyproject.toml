[project]
name = "codeshift-model-gateway"
version = "0.1.0"
description = "LLM-agnostic model gateway: init_chat_model + profiles + fallbacks + cost."
requires-python = ">=3.11"
dependencies = [
    "codeshift-common",
    "langchain>=0.3.0",
    "langchain-core>=0.3.0",
    # Provider packages are optional extras — install only what you use.
]

[project.optional-dependencies]
anthropic = ["langchain-anthropic>=0.2"]
openai = ["langchain-openai>=0.2"]
google = ["langchain-google-genai>=2.0"]
mistral = ["langchain-mistralai>=0.2"]
ollama = ["langchain-ollama>=0.2"]
all = [
    "langchain-anthropic>=0.2",
    "langchain-openai>=0.2",
    "langchain-google-genai>=2.0",
    "langchain-mistralai>=0.2",
    "langchain-ollama>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/codeshift_model_gateway"]
