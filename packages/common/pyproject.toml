[project]
name = "codeshift-common"
version = "0.1.0"
description = "Shared config, types, and telemetry for CodeShift."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/codeshift_common"]
