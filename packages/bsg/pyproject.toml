[project]
name = "codeshift-bsg"
version = "0.1.0"
description = "Behavioral Specification Graph: typed schemas + async Postgres store."
requires-python = ">=3.11"
dependencies = [
    "codeshift-common",
    "pydantic>=2.7",
    "asyncpg>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/codeshift_bsg"]
