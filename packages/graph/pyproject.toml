[project]
name = "codeshift-graph"
version = "0.1.0"
description = "LangGraph orchestration spine: state, nodes, durable HITL, checkpointer."
requires-python = ">=3.11"
dependencies = [
    "codeshift-common",
    "codeshift-model-gateway",
    "codeshift-bsg",
    "langgraph>=0.2.50",
    "langgraph-checkpoint-postgres>=2.0",
    "psycopg[binary,pool]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/codeshift_graph"]
