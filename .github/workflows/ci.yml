name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build + test (all modules)
        run: mvn -B verify

  # Placeholder for the Phase 0/1 eval gate (BSG-extraction / transformation evals).
  # Wired up once the Analysis Agent and golden corpora exist.
  evals:
    runs-on: ubuntu-latest
    steps:
      - run: echo "eval gate stub — see docs/architecture/implementation-plan.md"
