# Local dev dependencies for the Phase 0 spine.
# Postgres 16 with the pgvector extension (BSG graph + embeddings) and Redis
# (streaming / cache / queue). Bring up with: docker compose up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: codeshift
      POSTGRES_PASSWORD: codeshift
      POSTGRES_DB: codeshift
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Migrations are applied on first boot in filename order.
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeshift"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
