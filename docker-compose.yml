# Full local stack for the Phase 0 spine.
# Run with: docker compose up --build
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: codeshift
      POSTGRES_PASSWORD: codeshift
      POSTGRES_DB: codeshift
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeshift"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /workspace
    command: sh -c "mvn -q -f pom.xml -pl codeshift-api -am -DskipTests package && java -jar codeshift-api/target/codeshift-api-0.1.0-SNAPSHOT.jar"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/codeshift
      DB_USER: codeshift
      DB_PASSWORD: codeshift
    volumes:
      - .:/workspace
      - m2-cache:/root/.m2
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /workspace/codeshift-web
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:8080
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/codeshift-web/node_modules
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  m2-cache:
  web-node-modules:
