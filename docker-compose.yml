# Local dev dependencies for the Phase 0 spine.
# Postgres 16 with pgvector (BSG graph + embeddings) and Redis (cache / streams).
# The schema is applied by Flyway when codeshift-api starts — not here.
# Bring up with: docker compose up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: codeshift
      POSTGRES_PASSWORD: codeshift
      POSTGRES_DB: codeshift
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeshift"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
